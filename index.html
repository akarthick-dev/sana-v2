<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VRM Viewer - Idle Animation</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
    .box {

      left: 12px;

    }

  </style>
</head>
<body>
  <div class="box">
    <h3>Sana</h3>
    <div id="bridgeStatus">Bridge: connecting...</div>
    <div id="subtitle">Waiting for CLI messages...</div>
  </div>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { VRMLoaderPlugin, VRMUtils, VRMExpressionPresetName } from 'https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.0.6/lib/three-vrm.module.js';

// --------------------
// GLOBALS
// --------------------
let scene, camera, renderer, controls;
let vrm;
const clock = new THREE.Clock();
const TARGET_FPS =  /Mobi|Android/i.test(navigator.userAgent) ? 30 : 45;
const FRAME_DURATION = 1 / TARGET_FPS;
let lastFrameTime = 0;

// Blink state
let blinkTimer = 0;
let nextBlinkTime = 2;
let isBlinking = false;
let blinkProgress = 0;

// Idle animation state
let idleTime = 0;
let lookShiftTimer = 0;
let nextLookShiftTime = 2.4;
let lookYawBias = 0;
let lookPitchBias = 0;
let lookRollBias = 0;
let speakingFocus = 0;

// Chat bridge + lip sync state
const statusEl = document.getElementById('bridgeStatus');
const subtitleEl = document.getElementById('subtitle');
let ws;
let speaking = false;
let mouthOpen = 0;
let mouthTarget = 0;
let browShiftTimer = 0;
let nextBrowShiftTime = 1.6;
let browRandomTarget = 0;
let browRandom = 0;
let browTalk = 0;
let browBones = [];
let userActivatedAudio = false;
const assistantAudio = new Audio();
assistantAudio.preload = 'auto';
let audioContext = null;
let analyser = null;
let timeData = null;
let currentAssistantMessageId = '';
const pendingAssistantById = new Map();

const emotionState = {
  target: 'neutral',
  targetIntensity: 0,
  intensity: 0,
  holdUntilMs: 0,
  current: {
    joy: 0,
    fun: 0,
    angry: 0,
    sorrow: 0,
    surprised: 0,
    relaxed: 0,
  }
};

const EMOTION_PATTERNS = {
  joy: [
    /\b(haha|lol|great|awesome|nice|love|happy|cool|yay|good|perfect)\b/i,
    /!{2,}/,
    /😊|😄|😁|😂|❤️/
  ],
  angry: [
    /\b(angry|mad|annoy|irritat|stupid|wtf|damn|hate|fuck|shit)\b/i,
    /\b(not fair|nonsense|useless)\b/i
  ],
  sorrow: [
    /\b(sad|upset|depress|lonely|bad day|sorry|hurt|cry|tired)\b/i,
    /😢|😭/
  ],
  surprised: [
    /\b(wow|omg|seriously|no way|unexpected|what)\b/i,
    /\?{2,}/
  ],
  relaxed: [
    /\b(okay|fine|alright|sure|calm|chill|easy)\b/i,
    /\.\.\./
  ],
};

const tmpCamLocal = new THREE.Vector3();

// --------------------
// INIT SCENE
// --------------------
function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0xeeeeee);

  camera = new THREE.PerspectiveCamera(30, innerWidth / innerHeight, 0.1, 100);
  camera.position.set(0, 1.4, 2.5);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  document.body.appendChild(renderer.domElement);

  // Orbit controls for camera
  controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 1.0, 0);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.update();

  // Lighting - bright to show original model colors
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  
  // Strong ambient light for even illumination
  scene.add(new THREE.AmbientLight(0xffffff, 1.1));
  
  // Main light from front
scene.add(new THREE.AmbientLight(0xffffff, 1.2));

const light = new THREE.DirectionalLight(0xffffff, 0.6);
light.position.set(0, 1, 1);
scene.add(light);


  // Handle resize
  window.addEventListener('resize', onResize);
}

function onResize() {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}

function setBridgeStatus(text) {
  statusEl.textContent = `Bridge: ${text}`;
}

function inferEmotionFromText(text, role, eventType) {
  const cleaned = String(text || '').trim();
  if (!cleaned) {
    return { emotion: 'neutral', intensity: 0 };
  }

  const scores = {
    joy: 0,
    angry: 0,
    sorrow: 0,
    surprised: 0,
    relaxed: 0,
  };

  for (const [emotion, patterns] of Object.entries(EMOTION_PATTERNS)) {
    for (const pattern of patterns) {
      if (pattern.test(cleaned)) scores[emotion] += 1;
    }
  }

  let winner = 'neutral';
  let bestScore = 0;
  for (const [emotion, score] of Object.entries(scores)) {
    if (score > bestScore) {
      bestScore = score;
      winner = emotion;
    }
  }

  if (bestScore === 0) {
    return { emotion: 'neutral', intensity: 0.12 };
  }

  let intensity = THREE.MathUtils.clamp(0.28 + bestScore * 0.24, 0.25, 1.0);
  if (role === 'user') intensity *= 0.85;
  if (role === 'assistant' && (eventType === 'audio' || eventType === 'chat_audio')) intensity += 0.08;

  return { emotion: winner, intensity: THREE.MathUtils.clamp(intensity, 0.2, 1.0) };
}

function setEmotionTarget(text, role, eventType) {
  const result = inferEmotionFromText(text, role, eventType);
  emotionState.target = result.emotion;
  emotionState.targetIntensity = result.intensity;
  emotionState.holdUntilMs = performance.now() + 3800;
}

function updateEmotionExpressions(delta) {
  if (!vrm || !vrm.expressionManager) return;

  if (!speaking && performance.now() > emotionState.holdUntilMs) {
    emotionState.target = 'neutral';
    emotionState.targetIntensity = 0.08;
  }

  const ease = Math.min(1, delta * 4.0);
  emotionState.intensity = THREE.MathUtils.lerp(emotionState.intensity, emotionState.targetIntensity, ease);

  const i = emotionState.intensity;
  let targets = {
    joy: 0,
    fun: 0,
    angry: 0,
    sorrow: 0,
    surprised: 0,
    relaxed: 0.03,
  };

  if (emotionState.target === 'joy') {
    targets.joy = i * 0.62;
    targets.fun = i * 0.35;
  } else if (emotionState.target === 'angry') {
    targets.angry = i * 0.64;
  } else if (emotionState.target === 'sorrow') {
    targets.sorrow = i * 0.68;
    targets.relaxed = i * 0.16;
  } else if (emotionState.target === 'surprised') {
    targets.surprised = i * 0.72;
  } else if (emotionState.target === 'relaxed') {
    targets.relaxed = 0.10 + i * 0.48;
  }

  for (const key of Object.keys(emotionState.current)) {
    const targetValue = THREE.MathUtils.clamp(targets[key] || 0, 0, 1);
    emotionState.current[key] = THREE.MathUtils.lerp(emotionState.current[key], targetValue, Math.min(1, delta * 7.5));
  }

  const joyPreset = VRMExpressionPresetName.Joy || 'joy';
  const funPreset = VRMExpressionPresetName.Fun || 'fun';
  const angryPreset = VRMExpressionPresetName.Angry || 'angry';
  const sorrowPreset = VRMExpressionPresetName.Sorrow || 'sorrow';
  const surprisedPreset = VRMExpressionPresetName.Surprised || 'surprised';
  const relaxedPreset = VRMExpressionPresetName.Relaxed || 'relaxed';

  vrm.expressionManager.setValue(joyPreset, emotionState.current.joy);
  vrm.expressionManager.setValue(funPreset, emotionState.current.fun);
  vrm.expressionManager.setValue(angryPreset, emotionState.current.angry);
  vrm.expressionManager.setValue(sorrowPreset, emotionState.current.sorrow);
  vrm.expressionManager.setValue(surprisedPreset, emotionState.current.surprised);
  vrm.expressionManager.setValue(relaxedPreset, emotionState.current.relaxed);
}

function connectBridge() {
  const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${protocol}://${location.host}/ws`);

  ws.addEventListener('open', () => setBridgeStatus('connected'));
  ws.addEventListener('close', () => {
    setBridgeStatus('reconnecting...');
    setTimeout(connectBridge, 1200);
  });
  ws.addEventListener('error', () => setBridgeStatus('error'));

  ws.addEventListener('message', (event) => {
    let data;
    try {
      data = JSON.parse(event.data);
    } catch (_error) {
      return;
    }

    if (data.type !== 'chat') return;

    const role = data.role || 'assistant';
    const eventType = data.event || 'chat';
    const text = String(data.text || '').trim();
    const messageId = String(data.message_id || '').trim();
    if (!text) return;

    if (eventType === 'chat' || eventType === 'chat_audio') {
      const label = role === 'user' ? 'You' : 'Sana';
      subtitleEl.textContent = `${label}: ${text}`;

      if (role === 'assistant') {
        const effectiveId = messageId || `assistant-${Date.now()}`;
        currentAssistantMessageId = effectiveId;
        pendingAssistantById.set(effectiveId, text);
      }
    }

    if (role === 'assistant' && (eventType === 'audio' || eventType === 'chat_audio')) {
      const hasAudio = typeof data.audio_url === 'string' && data.audio_url.length > 0;

      if (hasAudio) {
        const effectiveId = messageId || currentAssistantMessageId;
        const syncedText = pendingAssistantById.get(effectiveId) || text;
        if (syncedText) {
          subtitleEl.textContent = `Sana: ${syncedText}`;
        }
        playAssistantAudio(data.audio_url, effectiveId);
      } else if (!hasAudio) {
        setBridgeStatus('assistant audio missing');
      }
    }
  });
}

function setupAudioAnalyser() {
  if (audioContext || !userActivatedAudio) return;

  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  if (!AudioCtx) return;

  audioContext = new AudioCtx();
  const source = audioContext.createMediaElementSource(assistantAudio);
  analyser = audioContext.createAnalyser();
  analyser.fftSize = 256;
  analyser.smoothingTimeConstant = 0.45;
  timeData = new Uint8Array(analyser.fftSize);

  source.connect(analyser);
  analyser.connect(audioContext.destination);
}

function playAssistantAudio(audioUrl, messageId) {
  const normalized = audioUrl.startsWith('/') ? audioUrl : `/${audioUrl}`;
  const cacheBusted = `${normalized}${normalized.includes('?') ? '&' : '?'}t=${Date.now()}`;

  assistantAudio.pause();
  assistantAudio.currentTime = 0;
  assistantAudio.src = cacheBusted;

  if (!userActivatedAudio) {
    setBridgeStatus('tap/click once to enable audio');
    return;
  }

  setupAudioAnalyser();
  if (audioContext && audioContext.state === 'suspended') {
    audioContext.resume().catch(() => {});
  }

  assistantAudio.play().then(() => {
    speaking = true;
    if (messageId) {
      currentAssistantMessageId = messageId;
      pendingAssistantById.delete(messageId);
    }
    setBridgeStatus('connected');
  }).catch(() => {
    setBridgeStatus('audio blocked by browser');
  });
}

function setMouthShape(openValue) {
  if (!vrm || !vrm.expressionManager) return;

  const open = THREE.MathUtils.clamp(openValue, 0, 1);
  vrm.expressionManager.setValue(VRMExpressionPresetName.Aa, open);
  vrm.expressionManager.setValue(VRMExpressionPresetName.Oh, open * 0.35);
  vrm.expressionManager.setValue(VRMExpressionPresetName.Ih, open * 0.2);
}

function setTalkingFace(talkAmount) {
  void talkAmount;
}


assistantAudio.addEventListener('ended', () => {
  speaking = false;
  mouthTarget = 0;
});

assistantAudio.addEventListener('pause', () => {
  if (assistantAudio.ended) {
    speaking = false;
    mouthTarget = 0;
  }
});

function updateLipSync(delta) {
  const audioSpeaking = !assistantAudio.paused && !assistantAudio.ended && assistantAudio.currentTime > 0;

  if (audioSpeaking && analyser && timeData) {
    analyser.getByteTimeDomainData(timeData);

    let sumSq = 0;
    for (let i = 0; i < timeData.length; i++) {
      const centered = (timeData[i] - 128) / 128;
      sumSq += centered * centered;
    }

    const rms = Math.sqrt(sumSq / timeData.length);
    const normalized = THREE.MathUtils.clamp(rms * 3.2, 0, 1);
    mouthTarget = Math.max(0.03, normalized);
    speaking = true;
  } else {
    speaking = false;
    mouthTarget = 0;
  }

  const smooth = mouthTarget > mouthOpen ? 0.55 : 0.35;
  mouthOpen = THREE.MathUtils.lerp(mouthOpen, mouthTarget, smooth);
  setMouthShape(mouthOpen);
  setTalkingFace(mouthOpen);
}

function updateEyebrowAnimation(delta) {
  if (!vrm) return;
  if (browBones.length === 0) return;

  browShiftTimer += delta;
  if (browShiftTimer >= nextBrowShiftTime) {
    browShiftTimer = 0;
    nextBrowShiftTime = 1.2 + Math.random() * 2.2;
    browRandomTarget = THREE.MathUtils.randFloat(-0.18, 0.22);
  }

  browRandom = THREE.MathUtils.lerp(browRandom, browRandomTarget, Math.min(1, delta * 1.8));

  const talkTarget = speaking ? mouthOpen : 0;
  browTalk = THREE.MathUtils.lerp(browTalk, talkTarget, Math.min(1, delta * 6.5));

  const raiseFromTalk = browTalk * 0.12;
  const raiseFromRandom = Math.max(0, browRandom);
  const lowerFromRandom = Math.max(0, -browRandom);

  const raise = THREE.MathUtils.clamp(0.01 + raiseFromTalk + raiseFromRandom * 0.07, -0.03, 0.12);
  const lower = THREE.MathUtils.clamp(lowerFromRandom * 0.06, 0, 0.08);

  for (let i = 0; i < browBones.length; i++) {
    const entry = browBones[i];
    const name = entry.bone.name.toLowerCase();
    const sideOffset = name.includes('left') ? -0.004 : name.includes('right') ? 0.004 : 0;
    const targetX = entry.baseX - raise + lower + sideOffset;
    entry.bone.rotation.x = THREE.MathUtils.lerp(entry.bone.rotation.x, targetX, Math.min(1, delta * 8.5));
  }
}

function cacheEyebrowBones() {
  if (!vrm || browBones.length > 0) return;

  const collected = [];
  vrm.scene.traverse((obj) => {
    if (!obj.isBone) return;
    const name = obj.name.toLowerCase();
    if (name.includes('brow') || name.includes('eyebrow')) {
      collected.push(obj);
    }
  });

  browBones = collected.slice(0, 8).map((bone) => ({
    bone,
    baseX: bone.rotation.x,
  }));

  if (browBones.length > 0) {
    console.log(`✅ Eyebrow bones detected: ${browBones.length}`);
  } else {
    console.log('ℹ️ No eyebrow bones detected. Brows animation skipped to protect lip sync.');
  }
}

// --------------------
// LOAD VRM MODEL
// --------------------
function loadVRM() {
  const loader = new GLTFLoader();
  loader.register(p => new VRMLoaderPlugin(p));

  loader.load(
    './ai_v2.vrm',  // Change this to your 3rd model filename
    (gltf) => {
      vrm = gltf.userData.vrm;

      VRMUtils.removeUnnecessaryVertices(vrm.scene);
      VRMUtils.removeUnnecessaryJoints(vrm.scene);

      // VRM faces -Z, rotate 180° to face camera
      vrm.scene.rotation.y = Math.PI;

      scene.add(vrm.scene);
      cacheEyebrowBones();

      console.log("✅ VRM loaded:", vrm);

    // --- ENABLE JIGGLE PHYSICS ---
// ===============================
// 🫨 CHEST JIGGLE PHYSICS
// ===============================
if (vrm.springBoneManager) {

  vrm.springBoneManager.springBones.forEach((spring) => {

    const name = spring.joint?.bone?.name?.toLowerCase() || "";

    // 🎯 target chest / bust bones
    if (
      name.includes("bust") ||
      name.includes("chest") ||
      name.includes("breast")
    ) {
      spring.stiffness = 0.12;     // ⬇ softer = more jiggle
      spring.gravityPower = 0.35;  // ⬆ bounce
      spring.dragForce = 0.45;     // ⬇ slower damping
      spring.hitRadius = 0.03;     // ⬆ soft collision

      console.log("🫨 Chest jiggle enabled on:", name);
    }
  });
}


    },
    (progress) => {
      if (progress.total > 0) {
        console.log("Loading VRM:", ((progress.loaded / progress.total) * 100).toFixed(1) + "%");
      }
    },
    (error) => console.error("❌ VRM load error:", error)
  );
}

// --------------------
// --------------------
// EYE BLINK ANIMATION
// --------------------
function updateBlink(delta) {
  if (!vrm || !vrm.expressionManager) return;

  blinkTimer += delta;

  if (!isBlinking) {
    // Wait for next blink
    if (blinkTimer >= nextBlinkTime) {
      isBlinking = true;
      blinkProgress = 0;
      blinkTimer = 0;
      // Random interval between blinks (2-5 seconds)
      nextBlinkTime = 2 + Math.random() * 3;
    }
  } else {
    // Perform blink animation
    blinkProgress += delta * 10; // Speed of blink
    
    if (blinkProgress < 1) {
      // Closing eyes
      vrm.expressionManager.setValue(VRMExpressionPresetName.Blink, blinkProgress);
    } else if (blinkProgress < 2) {
      // Opening eyes
      vrm.expressionManager.setValue(VRMExpressionPresetName.Blink, 2 - blinkProgress);
    } else {
      // Blink complete
      vrm.expressionManager.setValue(VRMExpressionPresetName.Blink, 0);
      isBlinking = false;
    }
  }
}


// --------------------
// IDLE POSE ANIMATION (breathing + subtle sway)
// --------------------
// Camera-follow head movement + autonomous idle glances.
function updateHeadLookAtCamera(head, neck, delta) {
  if (!head || !head.parent) return;

  const focusTarget = speaking ? 1 : 0;
  speakingFocus = THREE.MathUtils.lerp(speakingFocus, focusTarget, Math.min(1, delta * 6.5));

  lookShiftTimer += delta;
  if (lookShiftTimer >= nextLookShiftTime) {
    lookShiftTimer = 0;
    nextLookShiftTime = 2.0 + Math.random() * 2.8;
    lookYawBias = THREE.MathUtils.randFloat(-0.18, 0.18);
    lookPitchBias = THREE.MathUtils.randFloat(-0.07, 0.08);
    lookRollBias = THREE.MathUtils.randFloat(-0.06, 0.06);
  }

  tmpCamLocal.copy(camera.position);
  head.parent.worldToLocal(tmpCamLocal);

  const dx = tmpCamLocal.x - head.position.x;
  const dy = tmpCamLocal.y - head.position.y;
  const dz = tmpCamLocal.z - head.position.z;
  const distXZ = Math.hypot(dx, dz);

  const cameraYaw = THREE.MathUtils.clamp(Math.atan2(dx, dz), -0.45, 0.45);
  const cameraPitch = THREE.MathUtils.clamp(-Math.atan2(dy, Math.max(distXZ, 0.001)) * 0.9, -0.22, 0.22);

  // Tiny natural motion while still following the camera.
  const microYaw = Math.sin(idleTime * 0.9) * 0.03;
  const microPitch = Math.sin(idleTime * 1.1 + 1.2) * 0.018;
  const microRoll = Math.sin(idleTime * 0.65 + 0.7) * 0.018;
  const talkNod = speaking ? Math.sin(idleTime * 18.0) * 0.012 : 0;

  const cameraWeight = THREE.MathUtils.lerp(0.72, 0.97, speakingFocus);
  const biasWeight = THREE.MathUtils.lerp(1.0, 0.22, speakingFocus);
  const microWeight = THREE.MathUtils.lerp(1.0, 0.5, speakingFocus);

  const targetYaw = THREE.MathUtils.clamp(
    cameraYaw * cameraWeight + lookYawBias * biasWeight + microYaw * microWeight,
    -0.55,
    0.55
  );
  const targetPitch = THREE.MathUtils.clamp(
    cameraPitch * (cameraWeight - 0.06) + lookPitchBias * biasWeight + microPitch * microWeight + talkNod,
    -0.30,
    0.30
  );
  const targetRoll = THREE.MathUtils.clamp(lookRollBias * biasWeight + microRoll * microWeight, -0.14, 0.14);

  const neckLerp = THREE.MathUtils.lerp(0.10, 0.16, speakingFocus);
  const headLerp = THREE.MathUtils.lerp(0.16, 0.24, speakingFocus);
  const rollLerp = THREE.MathUtils.lerp(0.14, 0.20, speakingFocus);

  if (neck) {
    neck.rotation.y = THREE.MathUtils.lerp(neck.rotation.y, targetYaw * 0.35, neckLerp);
    neck.rotation.x = THREE.MathUtils.lerp(neck.rotation.x, targetPitch * 0.28, neckLerp);
    neck.rotation.z = THREE.MathUtils.lerp(neck.rotation.z, targetRoll * 0.40, neckLerp);
  }

  head.rotation.y = THREE.MathUtils.lerp(head.rotation.y, targetYaw, headLerp);
  head.rotation.x = THREE.MathUtils.lerp(head.rotation.x, targetPitch, headLerp);
  head.rotation.z = THREE.MathUtils.lerp(head.rotation.z, targetRoll, rollLerp);
}

function updateIdleAnimation(delta) {
  if (!vrm) return;

  idleTime += delta;

  // Get bones
  const hips = vrm.humanoid.getNormalizedBoneNode('hips');
  const spine = vrm.humanoid.getNormalizedBoneNode('spine');
  const chest = vrm.humanoid.getNormalizedBoneNode('chest');
  const upperChest = vrm.humanoid.getNormalizedBoneNode('upperChest');
  const neck = vrm.humanoid.getNormalizedBoneNode('neck');
  const head = vrm.humanoid.getNormalizedBoneNode('head');
  const leftUpperArm = vrm.humanoid.getNormalizedBoneNode('leftUpperArm');
  const rightUpperArm = vrm.humanoid.getNormalizedBoneNode('rightUpperArm');

  // Breathing cycle (inhale/exhale ~4 seconds)
  const breathCycle = Math.sin(idleTime * 1.5);
  
  // Chest breathing
  if (chest) {
    chest.rotation.x = breathCycle * 0.02;
  }
  if (upperChest) {
    upperChest.rotation.x = breathCycle * 0.015;
  }
  if (spine) {
    spine.rotation.x = breathCycle * 0.01;
  }

  // Subtle body sway (slower)
  const swayCycle = Math.sin(idleTime * 0.5);
  if (hips) {
    hips.rotation.y = swayCycle * 0.01;
  }
  if (spine) {
    spine.rotation.z = swayCycle * 0.005;
  }

  if (head) {
    updateHeadLookAtCamera(head, neck, delta);
  }


  // Keep arms down with very subtle movement
  if (leftUpperArm) {
    leftUpperArm.rotation.z = -1.45 + swayCycle * 0.01;  // Arms down at sides
    leftUpperArm.rotation.x = 0.05;
  }
  if (rightUpperArm) {
    rightUpperArm.rotation.z = 1.45 - swayCycle * 0.01; // Arms down at sides  
    rightUpperArm.rotation.x = 0.05;
  }
}
// Tail animation
let tailTime = 0;
let tailBones = []; // Cache tail bones after finding them

function findTailBones() {
  if (!vrm || tailBones.length > 0) return;
  
  // Search the entire scene for bones with "tail" or "foxtail" in the name
  // Exclude "end" bones which are just markers
  vrm.scene.traverse((obj) => {
    if (obj.isBone && 
        obj.name.toLowerCase().includes('tail') && 
        !obj.name.toLowerCase().includes('end')) {
      tailBones.push(obj);
      console.log('🦊 Found tail bone:', obj.name);
    }
  });
  
  // Sort by name to ensure proper order (tail1, tail2, tail3, etc.)
  tailBones.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));
  
  if (tailBones.length > 0) {
    console.log(`✅ Total tail bones found: ${tailBones.length}`);
  } else {
    // If no bones found, try finding ALL bones and log them
    console.log('❌ No tail bones found. Listing all bones:');
    vrm.scene.traverse((obj) => {
      if (obj.isBone) {
        console.log('  Bone:', obj.name);
      }
    });
  }
  
  // Disable spring bones for tail if they exist
  if (vrm.springBoneManager) {
    console.log('🔧 Spring bone manager found, tail may have physics');
  }
}




// --------------------
// ANIMATION LOOP (60 FPS)
// --------------------
function animate(currentTime) {
  requestAnimationFrame(animate);

  // Convert to seconds
  const time = currentTime / 1000;
  const elapsed = time - lastFrameTime;

  // Limit to target FPS
  if (elapsed < FRAME_DURATION) return;

  lastFrameTime = time - (elapsed % FRAME_DURATION);

  const delta = clock.getDelta();

  // Update VRM-specific features (expressions, spring bones)
  if (vrm) {
    updateIdleAnimation(delta);
    updateBlink(delta);
    updateLipSync(delta);
    updateEyebrowAnimation(delta);
    vrm.update(delta);  
  }

  // Update controls
  controls.update();

  // Render
  renderer.render(scene, camera);
}

// --------------------
// START
// --------------------
init();
loadVRM();
connectBridge();
requestAnimationFrame(animate);

// --------------------
// AUTO FULLSCREEN (works on mobile too)
// --------------------
function enterFullscreen() {
  const elem = document.documentElement;
  
  if (elem.requestFullscreen) {
    elem.requestFullscreen();
  } else if (elem.webkitRequestFullscreen) { // Safari
    elem.webkitRequestFullscreen();
  } else if (elem.msRequestFullscreen) { // IE/Edge
    elem.msRequestFullscreen();
  } else if (elem.mozRequestFullScreen) { // Firefox
    elem.mozRequestFullScreen();
  }
}

// Fullscreen on first user interaction (required by browsers)
function onFirstInteraction() {
  userActivatedAudio = true;
  setupAudioAnalyser();
  if (audioContext && audioContext.state === 'suspended') {
    audioContext.resume().catch(() => {});
  }
  enterFullscreen();
  // Remove listeners after first interaction
  document.removeEventListener('click', onFirstInteraction);
  document.removeEventListener('touchstart', onFirstInteraction);
  document.removeEventListener('keydown', onFirstInteraction);
}

// Listen for user interaction to trigger fullscreen
document.addEventListener('click', onFirstInteraction);
document.addEventListener('touchstart', onFirstInteraction);
document.addEventListener('keydown', onFirstInteraction);

// Also try on page load (may work in some contexts)
window.addEventListener('load', () => {
  // Show instruction overlay
  const overlay = document.createElement('div');
  overlay.id = 'fullscreen-hint';
  overlay.innerHTML = '👆 Tap or click to enter fullscreen';
  overlay.style.cssText = `
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 12px 24px;
    border-radius: 8px;
    font-family: sans-serif;
    font-size: 14px;
    z-index: 1000;
    pointer-events: none;
  `;
  document.body.appendChild(overlay);
  
  // Hide overlay after fullscreen or timeout
  setTimeout(() => {
    if (overlay.parentNode) overlay.remove();
  }, 5000);
  
  document.addEventListener('fullscreenchange', () => {
    if (document.fullscreenElement && overlay.parentNode) {
      overlay.remove();
    }
  });
});

// Exit fullscreen with ESC (already built-in) or double-tap
let lastTap = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTap < 300) {
    if (document.fullscreenElement) {
      document.exitFullscreen();
    } else {
      enterFullscreen();
    }
  }
  lastTap = now;
});

console.log("🎮 VRM Viewer initialized - Target: 60 FPS");
</script>
